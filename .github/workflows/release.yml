name: Release

# Build and publish installers when a version tag (e.g. v0.1.1) is pushed.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'          # universal .dmg (Apple Silicon + Intel)
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'        # .msi + .exe (NSIS)
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './app -> target'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: npm install
        working-directory: app

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'KEF Control ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform from the assets below.

            - Windows: the `*-setup.exe` (recommended) or the `*.msi`
            - macOS: the universal `.dmg` (runs on Apple Silicon and Intel)

            Both builds are unsigned. On first launch Windows shows a SmartScreen
            prompt (More info -> Run anyway); macOS shows a Gatekeeper prompt
            (right-click the app -> Open). See the README for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
