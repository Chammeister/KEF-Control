name: Release

# Build and publish installers when a version tag (e.g. v0.1.1) is pushed.
# Actions are pinned to commit SHAs (with the human-readable tag in a comment)
# for supply-chain safety; Dependabot keeps these SHAs updated.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'          # universal .dmg (Apple Silicon + Intel)
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'        # .msi + .exe (NSIS)
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './app -> target'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: npm install
        working-directory: app

      - name: Build and release
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'KEF Control ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform from the assets below.

            - Windows: the `*-setup.exe` (recommended) or the `*.msi`
            - macOS: the universal `.dmg` (runs on Apple Silicon and Intel)

            Both builds are unsigned. On first launch Windows shows a SmartScreen
            prompt (More info -> Run anyway); macOS shows a Gatekeeper prompt
            (right-click the app -> Open). See the README for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
